# SINGLE SOURCE OF TRUTH for the per-dataset organ_n -> organ_name mapping.
#
# TCGA and CMUH number their organs differently (historical artifact of the
# data ingest pipelines). Loaded by:
#   src/digital_registrar_research/benchmarks/organs.py
# and re-exposed for eval scripts via:
#   scripts/eval/_common/stratify.py
# Every site that converts organ_n <-> organ_name reads from here. Do not
# duplicate the mapping in code.
#
# The cross-corpus train-CMUH/test-TCGA baseline operates on the 5 organs
# present in BOTH datasets (= TCGA's full set, since TCGA's organs are a
# subset of CMUH's): breast, colorectal, thyroid, stomach, liver.
organ_code:
  tcga: 
    1: "breast"
    2: "colorectal"
    3: "thyroid"
    4: "stomach"
    5: "liver"
  cmuh: 
    1: "pancreas"
    2: "breast"
    3: "cervix"
    4: "colorectal"
    5: "esophagus"
    6: "liver"
    7: "lung"
    8: "prostate"
    9: "stomach"
    10: "thyroid"