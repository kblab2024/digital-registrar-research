# Decoding + smoke overrides for --model qwen3_5.
# Read by scripts/run_dspy_ollama_single.py and scripts/run_dspy_ollama_smoke.py.
#
# Model: ollama_chat/qwen3.5:27b
# Profile defaults (models.common.MODEL_PROFILES):
#   temperature=0.15  top_p=0.9  top_k=40
#   num_ctx=8192  max_tokens=4096
#   repeat_penalty=1.05  keep_alive="30m"  cache=false  seed=10
#
# Notes:
#   - Qwen team's canonical sampler is T=0.7 top_p=0.8 top_k=20; we cool it
#     down for deterministic extraction.
#   - If you see JSON truncation on long reports, raise max_tokens first
#     (6144-8192) before raising num_ctx.
#
# Any key left null falls through to the profile above.

decoding:
  temperature: null
  top_p: null
  top_k: null
  num_ctx: null
  max_tokens: null
  repeat_penalty: null
  keep_alive: null
  cache: null
  # seed: int (fixed), null (use base default 10), or "random" / "auto"
  # (fresh 31-bit int drawn at launch, logged into _run_meta.json so the
  # run stays reproducible after the fact).
  seed: null

smoke:
  n: 3
  seed: 0
