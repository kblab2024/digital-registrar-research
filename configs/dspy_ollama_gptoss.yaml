# Decoding + smoke overrides for --model gptoss.
# Read by scripts/run_dspy_ollama_single.py and scripts/run_dspy_ollama_smoke.py.
#
# Model: ollama_chat/gpt-oss:20b
# Profile defaults (models.common.MODEL_PROFILES):
#   temperature=0.3  top_p=1.0  top_k=40
#   num_ctx=8192  max_tokens=4096
#   repeat_penalty=1.05  keep_alive="30m"  cache=false  seed=10
#
# Any key left null falls through to the profile above. Only override what
# you need to change.

decoding:
  temperature: null
  top_p: null
  top_k: null
  num_ctx: null
  max_tokens: null
  repeat_penalty: null
  keep_alive: null
  cache: null
  # seed: int (fixed), null (use base default 10), or "random" / "auto"
  # (fresh 31-bit int drawn at launch, logged into _run_meta.json so the
  # run stays reproducible after the fact).
  seed: null

# Defaults for scripts/run_dspy_ollama_smoke.py. CLI --n / --seed win when set.
smoke:
  n: 3
  seed: 0
