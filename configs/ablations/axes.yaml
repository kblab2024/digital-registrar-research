# Cell → axis mapping used by the ablation stats module
# (src/digital_registrar_research/ablations/eval/stats.py).
#
# Multiple-comparisons families are formed per (axis, endpoint_tier).
# Within a primary-tier family, p-values get Holm-Bonferroni correction
# (FWER); within a secondary-tier family, BH-FDR.
#
# The optional `levels:` block tags each cell with its (A, B, C) factor
# level for the Grid-2 factorial GLMM in stats.factorial_glmm. Cells
# without a `levels` entry contribute only to the per-axis Holm/BH
# correction, not to the factorial fit.

axes:
  A:  # Pipeline decomposition
    - dspy_modular
    - dspy_monolithic
    - no_router
    - per_section
  B:  # Output structuring discipline
    - dspy_monolithic
    - str_outputs
    - constrained_decoding
    - free_text_regex
    - raw_json
  C:  # Prompting strategy
    - dspy_monolithic
    - fewshot_demos
    - chain_of_thought
    - compiled_dspy
    - minimal_prompt
  F:  # Schema specificity
    - raw_json
    - union_schema
    - flat_schema

# Factorial level labels per cell (Grid-2 only). Each cell can have at most
# one (axis_A, axis_B, axis_C) coordinate. Cells outside the 3x3x3 cube
# are ignored by the factorial fit.
#
# Grid 2 lattice (per reviewer-response-suggestions §1.3):
#   axis_A ∈ {modular, monolithic, no_router}
#   axis_B ∈ {dspy, raw_json, constrained}
#   axis_C ∈ {zero_shot, fewshot_3, compiled}
levels:
  dspy_modular:
    axis_A: modular
    axis_B: dspy
    axis_C: zero_shot
  dspy_monolithic:
    axis_A: monolithic
    axis_B: dspy
    axis_C: zero_shot
  no_router:
    axis_A: no_router
    axis_B: dspy
    axis_C: zero_shot
  raw_json:
    axis_A: monolithic
    axis_B: raw_json
    axis_C: zero_shot
  constrained_decoding:
    axis_A: monolithic
    axis_B: constrained
    axis_C: zero_shot
  fewshot_demos:
    axis_A: monolithic
    axis_B: dspy
    axis_C: fewshot_3
  compiled_dspy:
    axis_A: monolithic
    axis_B: dspy
    axis_C: compiled
